<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Denoising - DiffWave</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #10b981;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #334155;
            padding-bottom: 20px;
        }

        header h1 {
            color: var(--accent-color);
            margin-bottom: 10px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }

        .upload-area {
            border: 2px dashed #334155;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover {
            border-color: var(--accent-color);
            background: rgba(16, 185, 129, 0.05);
        }

        .upload-area input {
            display: none;
        }

        .upload-label {
            display: inline-block;
            background: var(--accent-color);
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-label:hover {
            background: #059669;
            transform: scale(1.02);
        }

        .status {
            margin-top: 15px;
            color: var(--text-muted);
        }

        .audio-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .audio-box {
            background: rgba(15, 23, 42, 0.6);
            padding: 15px;
            border-radius: 12px;
        }

        .audio-box h4 {
            margin: 0 0 10px 0;
            color: var(--text-muted);
        }

        audio {
            width: 100%;
            height: 45px;
        }

        .btn-denoise {
            background: #8b5cf6;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
        }

        .btn-denoise:hover {
            background: #7c3aed;
            transform: scale(1.02);
        }

        .btn-denoise:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .recognition-result {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--accent-color);
            display: none;
        }

        .recognition-result.show {
            display: block;
        }

        @media (max-width: 600px) {
            .audio-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <header>
        <h1><i class="fa-solid fa-wave-square"></i> Audio Denoising Demo</h1>
        <p style="color: var(--text-muted);">Upload a noisy audio → Denoise with DiffWave → Test Recognition</p>
    </header>

    <!-- UPLOAD & DENOISE -->
    <div class="card">
        <h3><i class="fa-solid fa-upload"></i> Upload & Denoise</h3>

        <div class="upload-area" id="uploadArea">
            <input type="file" id="fileInput" accept=".wav,.mp3,.m4a,.flac">
            <i class="fa-solid fa-cloud-upload-alt" style="font-size: 48px; color: var(--text-muted);"></i>
            <p style="color: var(--text-muted);">Click or drag & drop an audio file</p>
            <label for="fileInput" class="upload-label">Choose File</label>
            <div class="status" id="uploadStatus">No file selected</div>
        </div>

        <div style="text-align: center; margin-top: 15px;">
            <button class="btn-denoise" id="denoiseBtn" disabled>
                <i class="fa-solid fa-wand-magic-sparkles"></i> Denoise Audio
            </button>
            <div class="spinner" id="spinner"></div>
        </div>

        <div id="audioResult" style="display: none;">
            <div class="audio-row">
                <div class="audio-box">
                    <h4>🔊 Noisy Input</h4>
                    <audio controls id="noisyAudio"></audio>
                </div>
                <div class="audio-box">
                    <h4>✨ Denoised Output</h4>
                    <audio controls id="denoisedAudio"></audio>
                </div>
            </div>
            <div class="status" id="denoiseStatus"></div>
        </div>

        <!-- Recognition Result -->
        <div class="recognition-result" id="recognitionResult">
            <p><i class="fa-solid fa-microphone"></i> <span id="recognitionText">Speech detected: "..."</span></p>
        </div>
    </div>

    <!-- SAMPLE DATASETS -->
    <div class="card">
        <h3><i class="fa-solid fa-list"></i> Sample Audio Files</h3>
        <p style="color: var(--text-muted);">Click to load a sample and test denoising</p>

        <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px;">
            <button class="sample-btn" data-file="audio/Arabic/clean_noisy/Arabic_noisy_005_cooking_1_snr-5.wav">Arabic - Cooking (-5dB)</button>
            <button class="sample-btn" data-file="audio/Arabic/clean_noisy/Arabic_noisy_003_exercise_bike_snr0.wav">Arabic - Exercise (0dB)</button>
            <button class="sample-btn" data-file="audio/SC09/clean_noisy/SC09_noisy_005_doing_the_dishes_snr0.wav">SC09 - Dishes (0dB)</button>
            <button class="sample-btn" data-file="audio/LJSpeech/clean_noisy/LJSpeech_noisy_003_cooking_2_snr0.wav">LJSpeech - Cooking (0dB)</button>
        </div>
    </div>

</div>

<script>
    // =============================================================
    // CONSTANTS
    // =============================================================
    const HF_TOKEN = "hf_xxxxxxxxxxxxxxxxxxxxxxxx"; // Remplacez par votre token Hugging Face
    const API_URL = "https://api-inference.huggingface.co/models/facebook/denoiser";

    let selectedFile = null;
    let uploadedFilePath = null;

    // =============================================================
    // UPLOAD
    // =============================================================
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const status = document.getElementById('uploadStatus');

        if (file) {
            selectedFile = file;
            uploadedFilePath = URL.createObjectURL(file);
            status.innerHTML = `✅ ${file.name} (${(file.size/1024).toFixed(1)} KB)`;
            document.getElementById('denoiseBtn').disabled = false;

            // Show original audio
            document.getElementById('noisyAudio').src = uploadedFilePath;
            document.getElementById('noisyAudio').load();
            document.getElementById('audioResult').style.display = 'block';
        }
    });

    // =============================================================
    // SAMPLE BUTTONS
    // =============================================================
    document.querySelectorAll('.sample-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const filePath = this.dataset.file;
            const status = document.getElementById('uploadStatus');
            status.innerHTML = `📂 Loading sample: ${filePath}`;

            // Fetch the sample
            fetch(filePath)
                .then(res => res.blob())
                .then(blob => {
                    const file = new File([blob], filePath.split('/').pop(), { type: 'audio/wav' });
                    selectedFile = file;
                    uploadedFilePath = URL.createObjectURL(file);
                    document.getElementById('denoiseBtn').disabled = false;
                    status.innerHTML = `✅ Sample loaded: ${file.name}`;

                    document.getElementById('noisyAudio').src = uploadedFilePath;
                    document.getElementById('noisyAudio').load();
                    document.getElementById('audioResult').style.display = 'block';
                    document.getElementById('denoiseStatus').innerHTML = '';

                    // Hide previous denoised
                    document.getElementById('denoisedAudio').src = '';
                    document.getElementById('denoisedAudio').load();
                })
                .catch(err => {
                    status.innerHTML = `❌ Error loading sample: ${err.message}`;
                });
        });
    });

    // =============================================================
    // DENOISE
    // =============================================================
    document.getElementById('denoiseBtn').addEventListener('click', async function() {
        if (!selectedFile) return;

        const btn = this;
        const spinner = document.getElementById('spinner');
        const status = document.getElementById('denoiseStatus');

        btn.disabled = true;
        spinner.style.display = 'inline-block';
        status.innerHTML = '⏳ Denoising in progress...';

        try {
            // Convert audio to base64
            const arrayBuffer = await selectedFile.arrayBuffer();
            const base64 = btoa(
                new Uint8Array(arrayBuffer).reduce((data, byte) => data + String.fromCharCode(byte), '')
            );

            // Call Hugging Face API
            const response = await fetch(API_URL, {
                headers: {
                    'Authorization': `Bearer ${HF_TOKEN}`,
                    'Content-Type': 'application/json'
                },
                method: 'POST',
                body: JSON.stringify({ inputs: base64 })
            });

            const data = await response;

            if (data.status === 200) {
                // Convert response to audio blob
                const blob = await data.blob();
                const denoisedUrl = URL.createObjectURL(blob);

                // Show denoised audio
                document.getElementById('denoisedAudio').src = denoisedUrl;
                document.getElementById('denoisedAudio').load();

                status.innerHTML = '✅ Denoising successful!';
                status.style.color = '#10b981';

                // Test recognition
                testRecognition(blob);

            } else {
                const error = await data.json();
                status.innerHTML = `❌ API Error: ${error.error || 'Unknown error'}`;
                status.style.color = '#ef4444';
            }

        } catch (error) {
            status.innerHTML = `❌ Error: ${error.message}`;
            status.style.color = '#ef4444';
        }

        btn.disabled = false;
        spinner.style.display = 'none';
    });

    // =============================================================
    // RECOGNITION TEST (Whisper)
    // =============================================================
    async function testRecognition(audioBlob) {
        const resultDiv = document.getElementById('recognitionResult');
        const textSpan = document.getElementById('recognitionText');

        resultDiv.classList.remove('show');
        textSpan.textContent = 'Testing recognition...';

        try {
            // Convert to base64
            const reader = new FileReader();
            reader.readAsDataURL(audioBlob);
            reader.onload = async function() {
                const base64 = reader.result.split(',')[1];

                const response = await fetch(
                    'https://api-inference.huggingface.co/models/openai/whisper-base',
                    {
                        headers: {
                            'Authorization': `Bearer ${HF_TOKEN}`,
                            'Content-Type': 'application/json'
                        },
                        method: 'POST',
                        body: JSON.stringify({ inputs: base64 })
                    }
                );

                const data = await response.json();

                if (data.text) {
                    textSpan.textContent = `✅ Speech detected: "${data.text}"`;
                    resultDiv.style.borderColor = '#10b981';
                    resultDiv.style.background = 'rgba(16, 185, 129, 0.1)';
                } else {
                    textSpan.textContent = '❌ No speech detected';
                    resultDiv.style.borderColor = '#ef4444';
                    resultDiv.style.background = 'rgba(239, 68, 68, 0.1)';
                }

                resultDiv.classList.add('show');
            };
        } catch (error) {
            textSpan.textContent = `⚠️ Recognition error: ${error.message}`;
            resultDiv.classList.add('show');
        }
    }

    // =============================================================
    // DRAG & DROP
    // =============================================================
    const uploadArea = document.getElementById('uploadArea');

    uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.style.borderColor = '#10b981';
        uploadArea.style.background = 'rgba(16, 185, 129, 0.05)';
    });

    uploadArea.addEventListener('dragleave', () => {
        uploadArea.style.borderColor = '#334155';
        uploadArea.style.background = 'transparent';
    });

    uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.style.borderColor = '#334155';
        uploadArea.style.background = 'transparent';

        const file = e.dataTransfer.files[0];
        if (file) {
            const input = document.getElementById('fileInput');
            const dt = new DataTransfer();
            dt.items.add(file);
            input.files = dt.files;
            input.dispatchEvent(new Event('change'));
        }
    });
</script>

</body>
</html>
