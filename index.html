<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Denoising Demo - DiffWave + Gradio</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #10b981;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 1px solid #334155;
            padding-bottom: 20px;
        }

        header h1 {
            color: var(--accent-color);
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-muted);
        }

        /* Iframe Gradio */
        .gradio-container {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 40px;
            border: 1px solid #334155;
        }

        .gradio-container iframe {
            width: 100%;
            height: 800px;
            border: none;
            border-radius: 12px;
        }

        /* Dataset Tabs */
        .dataset-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 2px solid #334155;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .tab-btn.active, .tab-btn:hover {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.4);
        }

        /* Audio Cards */
        .audio-section {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        .audio-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #ef4444;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .snr-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .audio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }

        .audio-item {
            background: rgba(15, 23, 42, 0.6);
            padding: 12px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .audio-item span {
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        audio {
            width: 100%;
            height: 40px;
        }

        /* SNR Colors */
        .snr-neg5 { border-left-color: #ef4444; }
        .snr-0 { border-left-color: #f59e0b; }
        .snr-5 { border-left-color: #3b82f6; }

        .badge-neg5 { background-color: rgba(239, 68, 68, 0.2); color: #f87171; }
        .badge-0 { background-color: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .badge-5 { background-color: rgba(59, 130, 246, 0.2); color: #60a5fa; }

        /* Upload Section */
        .upload-section {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
            border: 2px dashed #334155;
        }

        .upload-section input[type="file"] {
            display: none;
        }

        .upload-label {
            background: var(--accent-color);
            color: white;
            padding: 14px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            display: inline-block;
            transition: all 0.3s;
        }

        .upload-label:hover {
            background: #059669;
            transform: scale(1.02);
        }

        .upload-status {
            margin-top: 15px;
            color: var(--text-muted);
        }

        @media (max-width: 600px) {
            .gradio-container iframe {
                height: 600px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <header>
        <h1><i class="fa-solid fa-wave-square"></i> Audio Denoising Demo</h1>
        <p>Generative Speech Enhancement using DDPM & DDIM Sampling on DiffWave Architecture</p>
    </header>

    <!-- ========================================================= -->
    <!-- GRADIO APP (Upload audio → Denoise → Test) -->
    <!-- ========================================================= -->
    <div class="gradio-container">
        <div style="text-align: center; margin-bottom: 15px;">
            <span style="color: var(--accent-color); font-weight: bold;">
                <i class="fa-solid fa-microphone"></i> Upload or Record Audio → Denoise → Test Recognition
            </span>
        </div>
        <!-- L'iframe Gradio -->
        <iframe src="https://laouarmeriem-coder.github.io/audio-denoising-demo/"></iframe>
        <!-- OU utilisez le lien public Gradio si vous en avez un -->
        <!-- <iframe src="https://votre-lien-gradio.gradio.live"></iframe> -->
    </div>

    <!-- ========================================================= -->
    <!-- UPLOAD SECTION (Alternative upload) -->
    <!-- ========================================================= -->
    <div class="upload-section">
        <h3><i class="fa-solid fa-upload"></i> Upload Your Own Audio</h3>
        <p style="color: var(--text-muted);">Upload a noisy audio file to test the denoising</p>
        <label for="file-upload" class="upload-label">
            <i class="fa-solid fa-cloud-upload-alt"></i> Choose Audio File
        </label>
        <input type="file" id="file-upload" accept=".wav,.mp3,.m4a,.flac">
        <div class="upload-status" id="upload-status">No file selected</div>
    </div>

    <!-- ========================================================= -->
    <!-- DATASET TABS -->
    <!-- ========================================================= -->
    <div class="dataset-tabs">
        <button class="tab-btn active" onclick="switchDataset('Arabic')">Arabic Matrix</button>
        <button class="tab-btn" onclick="switchDataset('SC09')">SC09 (Commands)</button>
        <button class="tab-btn" onclick="switchDataset('LJSpeech')">LJSpeech (Sentences)</button>
    </div>

    <!-- ========================================================= -->
    <!-- AUDIO CARDS -->
    <!-- ========================================================= -->
    <div id="audioSection" class="audio-section"></div>

</div>

<script>
    // =============================================================
    // DATA
    // =============================================================
    const datasetStore = {
        Arabic: [
            {
                title: "Exercise Bike Noise",
                snr: "0 dB",
                class: "snr-0",
                badgeClass: "badge-0",
                noisy: "audio/Arabic/clean_noisy/Arabic_noisy_003_exercise_bike_snr0.wav",
                ddpm: "audio/Arabic/ddpm/Arabic_denoisy_003_exercise_bike_snr0ddpm.wav",
                ddim: "audio/Arabic/ddim/Arabic_denoisy_003_walking_machine_snr0ddim.wav"
            },
            {
                title: "Cooking Noise",
                snr: "-5 dB",
                class: "snr-neg5",
                badgeClass: "badge-neg5",
                noisy: "audio/Arabic/clean_noisy/Arabic_noisy_005_cooking_1_snr-5.wav",
                ddpm: "audio/Arabic/ddpm/Arabic_denoisy_005_cooking_1_snr-5ddpm.wav",
                ddim: "audio/Arabic/ddim/Arabic_denoisy_005_cooking_1_snr-5ddim.wav"
            },
            {
                title: "Water Tap Flow",
                snr: "5 dB",
                class: "snr-5",
                badgeClass: "badge-5",
                noisy: "audio/Arabic/clean_noisy/Arabic_noisy_019_water_tap_snr5.wav",
                ddpm: "audio/Arabic/ddpm/Arabic_denoisy_019_water_tap_snr5ddpm.wav",
                ddim: "audio/Arabic/ddim/Arabic_denoisy_019_water_tap_snr5ddim.wav"
            }
        ],
        SC09: [
            {
                title: "Cooking Background",
                snr: "-5 dB",
                class: "snr-neg5",
                badgeClass: "badge-neg5",
                noisy: "audio/SC09/clean_noisy/SC09_noisy_002_cooking_2_snr-5.wav",
                ddpm: "audio/SC09/ddpm/SC09_denoisy_002_cooking_2_snr-5ddpm.wav",
                ddim: "audio/SC09/ddim/SC09_denoisy_002_cooking_2_snr-5ddim.wav"
            },
            {
                title: "Doing Dishes",
                snr: "0 dB",
                class: "snr-0",
                badgeClass: "badge-0",
                noisy: "audio/SC09/clean_noisy/SC09_noisy_005_doing_the_dishes_snr0.wav",
                ddpm: "audio/SC09/ddpm/SC09_denoisy_005_doing_the_dishes_snr0ddpm.wav",
                ddim: "audio/SC09/ddim/SC09_denoisy_005_doing_the_dishes_snr0ddim.wav"
            },
            {
                title: "High Interference Dishes",
                snr: "5 dB",
                class: "snr-5",
                badgeClass: "badge-5",
                noisy: "audio/SC09/clean_noisy/SC09_noisy_019_doing_the_dishes_snr5.wav",
                ddpm: "audio/SC09/ddpm/SC09_denoisy_019_doing_the_dishes_snr5ddpm.wav",
                ddim: "audio/SC09/ddim/SC09_denoisy_019_doing_the_dishes_snr5ddim.wav"
            }
        ],
        LJSpeech: [
            {
                title: "Sentence - Cooking",
                snr: "-5 dB",
                class: "snr-neg5",
                badgeClass: "badge-neg5",
                noisy: "audio/LJSpeech/clean_noisy/LJSpeech_noisy_004_cooking_2_snr-5.wav",
                ddpm: "audio/LJSpeech/ddpm/LJSpeech_denoisy_004_cooking_2_snr-5ddpm.wav",
                ddim: "audio/LJSpeech/ddim/LJSpeech_denoisy_004_cooking_2_snr-5ddim.wav"
            },
            {
                title: "Sentence - Cooking",
                snr: "0 dB",
                class: "snr-0",
                badgeClass: "badge-0",
                noisy: "audio/LJSpeech/clean_noisy/LJSpeech_noisy_003_cooking_2_snr0.wav",
                ddpm: "audio/LJSpeech/ddpm/LJSpeech_denoisy_003_cooking_2_snr0ddpm.wav",
                ddim: "audio/LJSpeech/ddim/LJSpeech_denoisy_003_cooking_2_snr0ddim.wav"
            },
            {
                title: "Sentence - Cooking",
                snr: "5 dB",
                class: "snr-5",
                badgeClass: "badge-5",
                noisy: "audio/LJSpeech/clean_noisy/LJSpeech_noisy_010_cooking_2_snr5.wav",
                ddpm: "audio/LJSpeech/ddpm/LJSpeech_denoisy_010_cooking_2_snr5ddpm.wav",
                ddim: "audio/LJSpeech/ddim/LJSpeech_denoisy_010_cooking_2_snr5ddim.wav"
            }
        ]
    };

    // =============================================================
    // RENDER
    // =============================================================
    function renderAudioCards(datasetName) {
        const container = document.getElementById('audioSection');
        container.innerHTML = '';

        const items = datasetStore[datasetName];
        items.forEach(item => {
            const cardHTML = `
                <div class="audio-card ${item.class}">
                    <div class="card-header">
                        <h3>${item.title}</h3>
                        <span class="snr-badge ${item.badgeClass}">SNR: ${item.snr}</span>
                    </div>
                    <div class="audio-grid">
                        <div class="audio-item">
                            <span><i class="fa-solid fa-triangle-exclamation" style="color: #ef4444;"></i> Noisy Input</span>
                            <audio controls src="${item.noisy}"></audio>
                        </div>
                        <div class="audio-item">
                            <span><i class="fa-solid fa-wand-magic-sparkles" style="color: #10b981;"></i> Enhanced (DDPM)</span>
                            <audio controls src="${item.ddpm}"></audio>
                        </div>
                        <div class="audio-item">
                            <span><i class="fa-solid fa-bolt" style="color: #3b82f6;"></i> Enhanced (DDIM Fast)</span>
                            <audio controls src="${item.ddim}"></audio>
                        </div>
                    </div>
                </div>
            `;
            container.innerHTML += cardHTML;
        });
    }

    function switchDataset(datasetName) {
        const buttons = document.querySelectorAll('.tab-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        renderAudioCards(datasetName);
    }

    // =============================================================
    // UPLOAD
    // =============================================================
    document.getElementById('file-upload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const status = document.getElementById('upload-status');
        if (file) {
            status.innerHTML = `✅ Selected: ${file.name} (${(file.size/1024).toFixed(1)} KB)`;
            status.style.color = '#10b981';
        } else {
            status.innerHTML = 'No file selected';
            status.style.color = '#94a3b8';
        }
    });

    // =============================================================
    // INIT
    // =============================================================
    window.onload = function() {
        renderAudioCards('Arabic');
    };
</script>

</body>
</html>
